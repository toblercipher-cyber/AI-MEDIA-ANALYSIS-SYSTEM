<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Center — AMAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/history.css">
    
    <style>
        .history-header {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 24px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-button {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
        }

        .header-title {
            margin: 0;
            font-size: 28px;
            color: #fff;
        }

        .header-subtitle {
            margin: 6px 0 0 0;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .search-section {
            display: grid;
            gap: 14px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .search-icon {
            flex-shrink: 0;
            opacity: 0.75;
        }

        .search-input {
            width: 100%;
            border: 0;
            outline: none;
            background: transparent;
            color: #fff;
            font-size: 15px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.45);
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-tab {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.9);
            padding: 10px 14px;
            border-radius: 999px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .filter-tab.active {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.18);
        }

        .count {
            min-width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.12);
            font-size: 12px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            margin: 18px 0;
        }

        .sort-dropdown {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .sort-select {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 12px;
            padding: 10px 12px;
            outline: none;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
        }

        .view-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .view-btn.active {
            background: rgba(255,255,255,0.14);
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .history-list {
            display: none;
            gap: 14px;
        }

        .history-card {
            padding: 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 16px 40px rgba(0,0,0,0.18);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .history-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.16);
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .history-title {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #fff;
        }

        .history-snippet {
            color: rgba(255,255,255,0.75);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .history-badge {
            display: inline-flex;
            align-items: center;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 12px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.09);
            color: #fff;
        }

        .empty-state,
        .loading-state {
            padding: 40px 20px;
            text-align: center;
            border-radius: 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 14px;
            background: #ffffff;
            color: #111;
            text-decoration: none;
            font-weight: 700;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .modal-content {
            width: min(780px, 100%);
            max-height: 90vh;
            overflow: auto;
            border-radius: 24px;
            background: #10131a;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 70px rgba(0,0,0,0.4);
            padding: 24px;
            position: relative;
            color: #fff;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            border: 0;
            background: transparent;
            color: #fff;
            cursor: pointer;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            padding-right: 36px;
        }

        .modal-title {
            margin: 0;
            font-size: 24px;
        }

        .modal-subtitle {
            margin: 6px 0 0 0;
            color: rgba(255,255,255,0.7);
        }

        .modal-body {
            display: grid;
            gap: 14px;
        }

        .detail-block {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .detail-label {
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .detail-value {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #111827;
            color: #fff;
            box-shadow: 0 12px 30px rgba(0,0,0,0.28);
            display: none;
            z-index: 1000;
        }

        .muted {
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <div class="history-container" style="padding: 24px;">
        <header class="history-header">
            <div class="header-row">
                <div class="header-left">
                    <a href="{{ url_for('dashboard') }}" class="back-button" title="Back to Dashboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </a>
                    <div>
                        <h1 class="header-title">History Center</h1>
                        <p class="header-subtitle">View all your previous chats (read-only)</p>
                    </div>
                </div>
            </div>

            <div class="search-section">
                <div class="search-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="Search chats, titles, or questions..."
                        aria-label="Search history"
                    >
                </div>

                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all" aria-selected="true">
                        <span>All Items</span>
                        <span class="count" id="countAll">0</span>
                    </button>
                    <button class="filter-tab" data-filter="URL" aria-selected="false">
                        <span>Videos</span>
                        <span class="count" id="countUrl">0</span>
                    </button>
                    <button class="filter-tab" data-filter="DOCUMENT" aria-selected="false">
                        <span>Documents</span>
                        <span class="count" id="countDocument">0</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="history-main">
            <div class="toolbar">
                <div class="sort-dropdown">
                    <label for="sortSelect" class="sort-label">Sort by:</label>
                    <select id="sortSelect" class="sort-select">
                        <option value="recent">Most Recent</option>
                        <option value="oldest">Oldest First</option>
                        <option value="type">Type</option>
                    </select>
                </div>

                <div class="view-toggle">
                    <button class="view-btn active" id="gridViewBtn" data-view="grid" title="Grid view">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </button>
                    <button class="view-btn" id="listViewBtn" data-view="list" title="List view">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="history-content">
                <div class="empty-state" id="emptyState" style="display: none;">
                    <h2>No history yet</h2>
                    <p class="muted">Your previous chats will appear here after you analyze videos or documents.</p>
                    <a href="{{ url_for('dashboard') }}" class="btn-primary">Go to Dashboard</a>
                </div>

                <div class="loading-state" id="loadingState">
                    <p>Loading your history...</p>
                </div>

                <div class="history-grid" id="historyGrid"></div>
                <div class="history-list" id="historyList"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" id="modalCloseBtn" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon"></div>
                <div>
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <p class="modal-subtitle" id="modalSubtitle"></p>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const historyGrid = document.getElementById("historyGrid");
        const historyList = document.getElementById("historyList");
        const emptyState = document.getElementById("emptyState");
        const loadingState = document.getElementById("loadingState");
        const searchInput = document.getElementById("searchInput");
        const sortSelect = document.getElementById("sortSelect");
        const modal = document.getElementById("detailModal");
        const modalCloseBtn = document.getElementById("modalCloseBtn");
        const modalTitle = document.getElementById("modalTitle");
        const modalSubtitle = document.getElementById("modalSubtitle");
        const modalBody = document.getElementById("modalBody");
        const modalIcon = document.getElementById("modalIcon");
        const toast = document.getElementById("toast");

        let currentView = "grid";
        let currentFilter = "all";
        let allItems = [];

        function showToast(message) {
            toast.textContent = message;
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 2200);
        }

        function formatDate(value) {
            if (!value) return "Unknown date";
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return String(value);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getFilteredItems() {
            const q = (searchInput.value || "").trim().toLowerCase();

            let items = allItems.filter(item => {
                const text = [
                    item.title,
                    item.conversation_type,
                    item.created_at
                ].join(" ").toLowerCase();

                const matchesQuery = !q || text.includes(q);
                const matchesFilter = currentFilter === "all" || item.conversation_type === currentFilter;
                return matchesQuery && matchesFilter;
            });

            const sortValue = sortSelect.value;
            items.sort((a, b) => {
                if (sortValue === "oldest") return new Date(a.created_at) - new Date(b.created_at);
                if (sortValue === "type") return a.conversation_type.localeCompare(b.conversation_type);
                return new Date(b.created_at) - new Date(a.created_at);
            });

            return items;
        }

        function renderItems() {
            const items = getFilteredItems();
            historyGrid.innerHTML = "";
            historyList.innerHTML = "";

            // Update counts
            document.getElementById("countAll").textContent = allItems.length;
            document.getElementById("countUrl").textContent = allItems.filter(i => i.conversation_type === "URL").length;
            document.getElementById("countDocument").textContent = allItems.filter(i => i.conversation_type === "DOCUMENT").length;

            if (!items.length) {
                emptyState.style.display = "block";
                historyGrid.style.display = "none";
                historyList.style.display = "none";
                loadingState.style.display = "none";
                return;
            }

            emptyState.style.display = "none";
            loadingState.style.display = "none";
            historyGrid.style.display = currentView === "grid" ? "grid" : "none";
            historyList.style.display = currentView === "list" ? "grid" : "none";

            items.forEach(item => {
                const typeLabel = item.conversation_type === "URL" ? "🔗 Video" : "📄 Document";
                
                const card = document.createElement("article");
                card.className = "history-card";
                card.innerHTML = `
                    <div class="history-badge">${typeLabel}</div>
                    <div class="history-meta">
                        <span>${item.conversation_type === "URL" ? "YouTube" : "Document"}</span>
                        <span>${formatDate(item.created_at)}</span>
                    </div>
                    <h3 class="history-title">${escapeHtml(item.title || "Untitled")}</h3>
                    <div class="history-snippet">${escapeHtml((item.executive_summary || "No summary available.").slice(0, 200))}</div>
                `;
                card.addEventListener("click", () => openDetail(item));
                historyGrid.appendChild(card);

                const listRow = document.createElement("article");
                listRow.className = "history-card";
                listRow.innerHTML = `
                    <div class="history-meta">
                        <span>${typeLabel}</span>
                        <span>${formatDate(item.created_at)}</span>
                    </div>
                    <h3 class="history-title">${escapeHtml(item.title || "Untitled")}</h3>
                    <div class="history-snippet">${escapeHtml((item.executive_summary || "No summary available.").slice(0, 200))}</div>
                `;
                listRow.addEventListener("click", () => openDetail(item));
                historyList.appendChild(listRow);
            });
        }

        function openDetail(item) {
            modalTitle.textContent = item.title || "Untitled";
            modalSubtitle.textContent = `${item.conversation_type === "URL" ? "🔗 Video" : "📄 Document"} • ${formatDate(item.created_at)}`;

            modalIcon.innerHTML = item.conversation_type === "DOCUMENT" ? "📄" : "🔗";

modalBody.innerHTML = `
    <div class="detail-block">
        <div class="detail-label">Summary</div>
        <div class="detail-value">${escapeHtml(item.executive_summary || "No summary available.")}</div>
    </div>
    ${item.sentiment ? `
    <div class="detail-block">
        <div class="detail-label">Sentiment</div>
        <div class="detail-value">${escapeHtml(item.sentiment)}</div>
    </div>
    ` : ''}
    <div class="detail-block">
        <div class="detail-label">Total Messages</div>
        <div class="detail-value">${item.message_count || 0}</div>
    </div>
    <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button id="continueBtn" class="btn-primary" style="flex: 1; padding: 12px; border-radius: 12px; background: #00bfff; color: #fff; border: none; cursor: pointer; font-weight: 700;">Continue Conversation</button>
        <button id="closeBtn" class="btn-secondary" style="flex: 1; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-weight: 700;">Close</button>
    </div>
`;

// Add event listeners for buttons
document.getElementById('continueBtn').addEventListener('click', () => {
    window.location.href = `/chat?id=${item.conversation_id}`;
});

document.getElementById('closeBtn').addEventListener('click', closeModal);

modal.style.display = "flex";
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeModal() {
            modal.style.display = "none";
        }

        modalCloseBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });

        document.querySelectorAll(".filter-tab").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderItems();
            });
        });

        document.getElementById("gridViewBtn").addEventListener("click", () => {
            currentView = "grid";
            document.getElementById("gridViewBtn").classList.add("active");
            document.getElementById("listViewBtn").classList.remove("active");
            renderItems();
        });

        document.getElementById("listViewBtn").addEventListener("click", () => {
            currentView = "list";
            document.getElementById("listViewBtn").classList.add("active");
            document.getElementById("gridViewBtn").classList.remove("active");
            renderItems();
        });

        searchInput.addEventListener("input", renderItems);
        sortSelect.addEventListener("change", renderItems);

        async function loadHistory() {
            loadingState.style.display = "block";
            try {
                const res = await fetch("/api/history");
                if (!res.ok) throw new Error("Failed to load history.");
                const data = await res.json();

                if (data.success) {
                    allItems = data.items || [];
                    renderItems();
                } else {
                    emptyState.style.display = "block";
                    loadingState.style.display = "none";
                }
            } catch (err) {
                console.error('Error loading history:', err);
                loadingState.innerHTML = '<p>Error loading history</p>';
            }
        }

        loadHistory();
    </script>

</body>
</html>
