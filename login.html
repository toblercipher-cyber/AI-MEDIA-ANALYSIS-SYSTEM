<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AMAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/login.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <main class="signin">

        <section class="signin-card" id="reveal">

            <div class="signin-mark" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
                    <rect x="2" y="2" width="28" height="28" rx="6" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M16 9L9 23M16 9L23 23M12 19H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <div class="signin-head">
                <div class="signin-eyebrow">
                    <span class="signin-eyebrow-dot"></span>
                    <span class="signin-eyebrow-label">SIGN IN</span>
                </div>
                <h1 class="signin-title">
                    WELCOME<br>
                    <span class="signin-title-outline">BACK</span>
                </h1>
                <p class="signin-sub">Access your AI media analysis workspace.</p>
            </div>

            <form class="signin-form" id="signin-form" novalidate autocomplete="on">
                <div class="signin-field">
                    <label for="si-email" class="signin-label">001 // EMAIL</label>
                    <input type="email" id="si-email" name="email" class="signin-input" placeholder="you@example.com" autocomplete="email" required>
                </div>

                <div class="signin-field">
                    <label for="si-password" class="signin-label">002 // PASSWORD</label>
                    <input type="password" id="si-password" name="password" class="signin-input" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <div class="signin-error" id="signin-error" role="alert" hidden></div>

                <button type="submit" class="signin-btn">
                    <span>Sign In</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 17L17 7M17 7H8M17 7V16"/>
                    </svg>
                </button>
            </form>

            <div class="signin-foot">
                <span>Don't have an account?</span>
                <!-- ✅ CHANGE 1: Register link now uses Flask url_for instead of ../templates/register.html -->
                <a href="{{ url_for('register') }}" class="signin-link">Sign up — it's free</a>
            </div>
        </section>

        <div class="signin-meta">
            <p class="signin-meta-text">
                Join <span class="signin-meta-highlight">thousands</span> of teams using AMAS to analyze media at scale.
            </p>
            <div class="signin-avatars" aria-hidden="true">
                <div class="signin-avatar"></div>
                <div class="signin-avatar"></div>
                <div class="signin-avatar"></div>
                <div class="signin-avatar"></div>
            </div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../static/script.js"></script>
    <script>
    (function () {
        var form = document.getElementById('signin-form');
        var errorBox = document.getElementById('signin-error');
        var submitBtn = form ? form.querySelector('.signin-btn') : null;
        if (!form || !errorBox) return;

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.hidden = false;
        }
        function clearError() {
            errorBox.textContent = '';
            errorBox.hidden = true;
        }
        function isEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        form.addEventListener('submit', function (ev) {
            ev.preventDefault();
            clearError();

            var email = (form.elements['email'].value || '').trim();
            var password = form.elements['password'].value || '';

            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }
            if (!isEmail(email)) {
                showError('Please enter a valid email address.');
                return;
            }

            clearError();
            if (submitBtn) submitBtn.disabled = true;

            fetch("{{ url_for('login') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function (res) {
                return res.json().then(function (data) { return data; });
            })
            .then(function (data) {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    showError(data.message || 'Invalid email or password.');
                    if (submitBtn) submitBtn.disabled = false;
                }
            })
            .catch(function () {
                showError('Something went wrong. Please try again.');
                if (submitBtn) submitBtn.disabled = false;
            });
        });
    })();
    </script>

</body>
</html>
