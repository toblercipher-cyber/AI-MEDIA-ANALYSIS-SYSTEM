<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analysis — AMAS AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/process.css">
    <style>
        /* ==============================================
           AMAS AI — Premium Video / URL Analysis UI
           Figma: AI Chatbot UI (Dark Theme)
           All backend functionality & JS elements PRESERVED.
           ============================================== */
        :root {
            --sidebar-w: 260px;
            --bg-deep:   #0a0a0f;
            --bg-panel:  #111118;
            --bg-card:   rgba(255, 255, 255, 0.035);
            --border:    rgba(255, 255, 255, 0.07);
            --border-hover: rgba(255, 255, 255, 0.14);
            --accent:    #1DB584;
            --accent-2:  #00C2FF;
            --text-primary: #EEEEF0;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.32);
            --error:     rgba(255, 75, 75, 0.15);
            --error-border: rgba(255, 75, 75, 0.30);
            --error-text: #FFB3B3;
            --radius-xl: 20px;
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 8px;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%; min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* ===================== BACKGROUND ===================== */
        #bg-canvas {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
            width: 100% !important; height: 100% !important;
        }

        .container {
            position: fixed; inset: 0; z-index: 1;
            width: 100%; height: 100%;
            background: transparent; overflow: hidden;
            pointer-events: none;
        }

        /* Stars & Particles (Preserved & Adjusted) */
        #stars, #stars2, #stars3 {
            position: absolute;
            width: 1px; height: 1px;
            background: transparent;
        }
        #stars {
            box-shadow: 501px 811px rgba(255,255,255,0.5), 1450px 324px rgba(255,255,255,0.4), 1093px 780px rgba(255,255,255,0.5), 469px 678px rgba(255,255,255,0.3);
            animation: drift 60s linear infinite;
        }
        #stars2 {
            width: 2px; height: 2px;
            box-shadow: 299px 200px rgba(255,255,255,0.3), 752px 543px rgba(255,255,255,0.25), 1201px 890px rgba(255,255,255,0.35);
            animation: drift 90s linear infinite;
        }
        #stars3 {
            width: 3px; height: 3px;
            box-shadow: 700px 300px rgba(255,255,255,0.2), 1300px 600px rgba(255,255,255,0.22);
            animation: drift 150s linear infinite;
        }
        @keyframes drift {
            from { transform: translateY(0); }
            to   { transform: translateY(-2000px); }
        }

        /* Flowing Particles Container */
        .particles {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; overflow: hidden;
        }

        /* ==================== APP LAYOUT SHELL ==================== */
        .app-shell {
            position: relative; z-index: 2;
            display: flex;
            width: 100%; min-height: 100vh;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed; left: 0; top: 0; bottom: 0;
            z-index: 100;
            transition: transform var(--transition);
            overflow: hidden;
        }

        .sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-w)));
        }

        .sidebar-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-size: 13px; font-weight: 800;
            color: #fff; flex-shrink: 0;
        }

        .sidebar-brand {
            font-family: var(--font-display);
            font-size: 15px; font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .sidebar-brand span { color: var(--accent); }
        .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
        .sidebar-sec-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 8px 8px 4px; margin-top: 8px; }
        
        .sidebar-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 10px;
            border-radius: var(--radius-sm);
            font-size: 13.5px; font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer; text-decoration: none;
            transition: background var(--transition), color var(--transition);
            margin-bottom: 2px;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            background: rgba(29, 181, 132, 0.12);
            color: var(--accent);
        }

        .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.8; }
        .sidebar-item.active svg { opacity: 1; }

        .sidebar-footer { padding: 14px 12px; border-top: 1px solid var(--border); }
        .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius-md); cursor: pointer; transition: background var(--transition); }
        .sidebar-user:hover { background: rgba(255, 255, 255, 0.05); }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .user-plan { font-size: 11px; color: var(--text-muted); }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition);
        }

        .main-content.expanded { margin-left: 0; }

        /* ==================== TOPBAR ==================== */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .sidebar-toggle { width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); transition: all var(--transition); }
        .sidebar-toggle:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-primary); }
        .topbar-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .topbar-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; letter-spacing: 0.04em; }
        .topbar-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-md); background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition); font-family: var(--font-main); }
        .topbar-btn:hover { background: rgba(255, 255, 255, 0.07); color: var(--text-primary); border-color: var(--border-hover); }

        /* ==================== PAGE BODY ==================== */
        .page-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 24px 52px;
            max-width: 860px;
            margin: 0 auto;
            width: 100%;
        }

        /* ==================== HERO HEADER ==================== */
        .process-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem;
            padding: 46px 0 28px;
            width: 100%;
        }

        .process-eyebrow {
            display: flex; align-items: center; gap: 8px;
        }

        .process-eyebrow-dot {
            position: relative; width: 8px; height: 8px;
            background: var(--accent-2); border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-2); flex-shrink: 0;
        }

        .process-eyebrow-dot::after {
            content: ''; position: absolute; inset: 0;
            background: var(--accent-2); border-radius: 50%;
            animation: ping 1.8s ease-in-out infinite; opacity: 0.5;
        }

        @keyframes ping {
            0% { transform: scale(1); opacity: 0.5; }
            70% { transform: scale(2.4); opacity: 0; }
            100% { transform: scale(2.4); opacity: 0; }
        }

        .process-eyebrow-label {
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--text-secondary);
        }

        .process-title {
            font-family: var(--font-display);
            font-size: clamp(24px, 4.5vw, 36px);
            font-weight: 800; line-height: 1.15;
            letter-spacing: -0.02em; text-transform: uppercase;
            color: var(--text-primary);
        }

        .process-title-outline {
            -webkit-text-stroke: 1.5px var(--text-primary);
            color: transparent;
        }

        /* ==================== SCAN MODULE (PRESERVED & STYLED) ==================== */
        .scan {
            position: relative;
            width: 320px; height: 260px;
            max-width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            background: rgba(10, 10, 15, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        /* Concentric ring paths */
        .scan-ring {
            position: absolute; left: 50%;
            border-top: 1px dashed rgba(0, 194, 255, 0.15);
            border-radius: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        .scan-ring-1 { top: 30px; width: 130%; height: 100%; }
        .scan-ring-2 { top: 75px; width: 110%; height: 100%; }
        .scan-ring-3 { top: 120px; width: 100%; height: 100%; }
        .scan-ring-4 { top: 165px; width: 80%; height: 100%; }

        .scan-beam {
            position: absolute; bottom: 20px; left: 158px;
            width: 250px; height: 250px;
            transform-origin: bottom left; pointer-events: none;
            background: radial-gradient(circle at 0% 100%, rgba(0, 194, 255, 0.12) 5%, transparent 60%);
            opacity: 0.8; animation: sweep 6s ease-in-out infinite;
        }
        @keyframes sweep {
            0%, 100% { transform: rotate(-55deg); opacity: 0.6; }
            50% { transform: rotate(-35deg); opacity: 0.9; }
        }

        .scan-dots {
            position: absolute; inset: 0; pointer-events: none;
            animation: pulse-dots 2s ease-in-out infinite;
        }
        @keyframes pulse-dots {
            0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
        }

        .scan-hub {
            position: absolute; bottom: 8px; left: 50%;
            transform: translateX(-50%);
            width: 48px; height: 48px;
            border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.08);
            background: #000; pointer-events: none;
        }

        /* ==================== FORM PANEL ==================== */
        .process-form {
            width: 100%;
        }

        /* PRESERVED: class="process-bar" */
        .process-bar {
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .process-bar::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 194, 255, 0.4), transparent);
            opacity: 0; transition: opacity var(--transition);
        }

        .process-bar:focus-within::before { opacity: 1; }

        .process-bar:focus-within {
            border-color: rgba(0, 194, 255, 0.35);
            background: rgba(255, 255, 255, 0.045);
            box-shadow: 0 0 0 1px rgba(0, 194, 255, 0.08), 0 8px 32px rgba(0,0,0,0.3);
        }

        .process-toolbar {
            display: flex; align-items: center;
            padding: 10px 16px 0;
            background: transparent;
        }

        /* PRESERVED: class="process-add" */
        .process-add {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; background: transparent;
            border: 1px solid var(--border); border-radius: 20px;
            color: var(--text-secondary); font-family: var(--font-mono);
            font-size: 9.5px; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            cursor: pointer; transition: all var(--transition);
        }

        .process-add:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            background: rgba(255,255,255,0.05);
        }

        /* PRESERVED: id="process-input", name="url", class="process-input" */
        .process-input {
            width: 100%;
            padding: 14px 70px 14px 16px;
            background: transparent; border: none;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 14.5px; line-height: 1.6;
            resize: none; outline: none;
        }

        .process-input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        /* PRESERVED: class="process-submit" */
        .process-submit {
            position: absolute; top: 50%; right: 12px;
            transform: translateY(-50%);
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: var(--radius-md);
            color: #000; cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 194, 255, 0.25);
            transition: all var(--transition);
        }

        .process-submit svg { width: 15px; height: 15px; stroke: #000; }
        .process-submit:hover {
            box-shadow: 0 6px 20px rgba(0, 194, 255, 0.45);
            transform: translateY(-50%) scale(1.05);
        }
        .process-submit:active { transform: translateY(-50%) scale(0.96); }

        /* PRESERVED: class="process-extra" */
        .process-extra {
            margin-top: 14px;
            display: flex; flex-direction: column;
            gap: 14px;
        }

        .field-row {
            display: flex; flex-direction: column; gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px 18px; border-radius: var(--radius-xl);
        }

        .field-label {
            font-size: 11.5px; font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.08em; text-transform: uppercase;
        }

        /* PRESERVED: id="question" */
        .field-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            color: var(--text-primary); outline: none;
            font-family: var(--font-main); font-size: 14px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .field-input:focus {
            border-color: rgba(29, 181, 132, 0.35);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(29, 181, 132, 0.06);
        }

        .field-input::placeholder { color: var(--text-muted); }

        /* PRESERVED: class="translate-row" */
        .translate-row {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary);
            font-size: 13.5px; font-weight: 500;
            padding: 4px 18px; cursor: pointer;
            user-select: none;
        }

        /* PRESERVED: id="translate" */
        .translate-row input {
            width: 16px; height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* ==================== LOADING OVERLAY ==================== */
        .loading { opacity: 0.65; pointer-events: none; }

        /* ==================== ERROR BOX ==================== */
        /* PRESERVED: id="error-box" class="error-box" + .show */
        .error-box {
            margin-top: 18px;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            background: var(--error);
            border: 1px solid var(--error-border);
            color: var(--error-text);
            display: none;
            font-size: 14px;
            align-items: center; gap: 10px;
            width: 100%;
        }

        .error-box.show { display: flex; }
        .error-icon { flex-shrink: 0; width: 18px; height: 18px; color: var(--error-text); }

        /* ==================== RESPONSE PANEL ==================== */
        /* PRESERVED: id="response-panel" class="response-panel" + .show */
        .response-panel {
            margin-top: 32px;
            width: 100%;
            display: none;
            flex-direction: column;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .response-panel.show { display: flex; }
        @keyframes slideUp { from{opacity:0; transform:translateY(15px);} to{opacity:1; transform:translateY(0);} }

        .response-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            border-bottom: 1px solid var(--border);
        }

        .response-title-group { display: flex; align-items: center; gap: 8px; }
        .response-panel-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .response-ai-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 20px; background: rgba(0, 194, 255, 0.15); border: 1px solid rgba(0, 194, 255, 0.3); color: var(--accent-2); letter-spacing: 0.05em; }

        /* PRESERVED: class="status-text", id="status-text" */
        .status-text {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            display: flex; align-items: center; gap: 6px;
        }

        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); display: inline-block; }
        .status-dot.success { background: var(--accent); }
        .status-dot.error { background: #FF6B6B; }
        .status-dot.loading { background: var(--accent-2); box-shadow: 0 0 6px rgba(0,194,255,0.5); animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0%, 100%{opacity: 0.4;} 50%{opacity: 1;} }

        .response-panel-body {
            padding: 20px;
            background: rgba(10, 10, 15, 0.65);
            border: 1px solid var(--border); border-top: none;
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
        }

        /* PRESERVED: class="response-grid" */
        .response-grid {
            display: grid;
            gap: 12px;
            margin-top: 0;
        }

        /* PRESERVED: class="response-card" */
        .response-card {
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: border-color var(--transition);
        }

        .response-card:hover { border-color: var(--border-hover); }

        /* PRESERVED: class="response-label" */
        .response-label {
            display: flex; align-items: center; gap: 7px;
            font-size: 11px; letter-spacing: 0.08em;
            text-transform: uppercase; font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .response-label-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-2); }

        /* PRESERVED: class="response-value" */
        /* Mapped response outputs (PRESERVED ids: result-title, result-transcript, result-summary, result-answer, result-actions, result-decisions, result-open-questions) */
        .response-value {
            font-size: 14.5px;
            line-height: 1.65;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ---- Sidebar Overlay (mobile) ---- */
        .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity var(--transition); }
        .sidebar-overlay.visible { opacity: 1; pointer-events: auto; }

        /* ---- Responsive Design ---- */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0 !important; }
            .page-body { padding: 0 16px 40px; }
            .topbar { padding: 10px 16px; }
            .process-header { padding: 32px 0 20px; }
            .sidebar-overlay { display: block; }
        }

        /* ---- Scrollbars ---- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
    </style>
</head>
<body>

    <!-- Background Elements (Three.js canvas + custom stars preserved) -->
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>
    
    <!-- Flowing down particles -->
    <div class="particles" aria-hidden="true">
        <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span>
    </div>

    <!-- Mobile Drawer Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">

    <script>
        /* =====================================================
           AMAS AI — Inline JavaScript
           PRESERVED: Form elements, validation constraints,
           fetch POST endpoint `/url-analysis`, FormData key/value bindings,
           JSON parsing mapping, error handlers, and output mappings.
           ===================================================== */
        const form = document.getElementById("process-form");
        const errorBox = document.getElementById("error-box");
        const responsePanel = document.getElementById("response-panel");
        const statusText = document.getElementById("status-text");

        const resultTitle = document.getElementById("result-title");
        const resultTranscript = document.getElementById("result-transcript");
        const resultSummary = document.getElementById("result-summary");
        const resultAnswer = document.getElementById("result-answer");
        const resultActions = document.getElementById("result-actions");
        const resultDecisions = document.getElementById("result-decisions");
        const resultOpenQuestions = document.getElementById("result-open-questions");

        const sidebarBtn = document.getElementById("sidebar-toggle-btn");
        const sidebar = document.getElementById("sidebar");
        const mainContent = document.getElementById("main-content");
        const overlay = document.getElementById("sidebar-overlay");

        /* ---- Sidebar Drawer Trigger (UI Added Option) ---- */
        let sidebarOpen = window.innerWidth > 768;
        function setSidebar(open) {
            sidebarOpen = open;
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle("open", open);
                overlay.classList.toggle("visible", open);
            } else {
                sidebar.classList.toggle("collapsed", !open);
                mainContent.classList.toggle("expanded", !open);
                overlay.classList.remove("visible");
            }
            sidebarBtn.setAttribute("aria-expanded", String(open));
        }
        sidebarBtn.addEventListener("click", () => setSidebar(!sidebarOpen));
        overlay.addEventListener("click", () => setSidebar(false));

        /* ---- Status Indicator Handler (UI Helper) ---- */
        function setStatus(text, state) {
            statusText.innerHTML = "";
            const dot = document.createElement("span");
            dot.className = "status-dot" + (state ? " " + state : "");
            statusText.appendChild(dot);
            statusText.appendChild(document.createTextNode(" " + text));
        }

        /* ---- Error Helpers (PRESERVED) ---- */
        function showError(message) {
            errorBox.innerHTML = "";
            const icon = `<svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
            errorBox.innerHTML = icon + `<span>${message}</span>`;
            errorBox.classList.add("show");
        }

        function clearError() {
            errorBox.innerHTML = "";
            errorBox.classList.remove("show");
        }

        /* ---- Value Renderer (PRESERVED) ---- */
        function renderValue(value) {
            if (value === null || value === undefined || value === "") return "No data available.";
            if (Array.isArray(value)) return value.join("\n");
            if (typeof value === "object") return JSON.stringify(value, null, 2);
            return String(value);
        }

        /* ---- Submission Event Listener (PRESERVED) ---- */
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearError();

            const submitBtn = form.querySelector(".process-submit");
            const bar = form.querySelector(".process-bar");

            /* PRESERVED: FormData collection elements */
            const formData = new FormData();
            formData.append("url", document.getElementById("process-input").value.trim());
            formData.append("question", document.getElementById("question").value.trim());
            formData.append("translate", document.getElementById("translate").checked ? "true" : "false");

            /* PRESERVED: validation conditions */
            if (!formData.get("url")) {
                showError("Please enter a valid URL.");
                return;
            }

            if (!formData.get("question")) {
                showError("Please enter a question.");
                return;
            }

            try {
                bar.classList.add("loading");
                submitBtn.disabled = true;
                setStatus("Processing... please wait.", "loading");
                responsePanel.classList.add("show");

                /* PRESERVED: fetch POST URL analysis endpoint */
                const response = await fetch("/url-analysis", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.message || "Something went wrong while processing the URL.");
                }

                const result = data.result || {};

                /* PRESERVED: Response grid element output binding */
                resultTitle.textContent = renderValue(result.title);
                resultTranscript.textContent = renderValue(result.transcript_preview);
                resultSummary.textContent = renderValue(result.summary);
                resultAnswer.textContent = renderValue(result.answer);
                resultActions.textContent = renderValue(result.action_items);
                resultDecisions.textContent = renderValue(result.key_decisions);
                resultOpenQuestions.textContent = renderValue(result.open_questions);

                setStatus("Analysis completed successfully.", "success");
            } catch (err) {
                responsePanel.classList.add("show");
                setStatus("Processing failed.", "error");
                showError(err.message || "Unexpected error.");
            } finally {
                bar.classList.remove("loading");
                submitBtn.disabled = false;
            }
        });
    </script>
